<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Money - 管理后台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f0f0f;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 24px;
}
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 24px; color: #fff; }
h2 { font-size: 16px; color: #999; margin-bottom: 12px; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; }

.card {
  background: #1a1a1a;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px solid #2a2a2a;
}

.input-row { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; }
.input-row label { font-size: 13px; color: #999; min-width: 100px; }
.input-row input {
  flex: 1; padding: 10px 12px;
  background: #111; border: 1px solid #333; border-radius: 6px;
  color: #fff; font-size: 14px; outline: none;
}
.input-row input:focus { border-color: #4f9cff; }

.btn {
  padding: 10px 20px; border: none; border-radius: 6px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  color: #fff; transition: opacity 0.2s;
}
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #4f9cff; }
.btn-primary:hover:not(:disabled) { background: #3d8bfd; }
.btn-outline { background: transparent; border: 1px solid #4f9cff; color: #4f9cff; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.code-list {
  background: #111; border: 1px solid #333; border-radius: 6px;
  max-height: 200px; overflow-y: auto; padding: 12px;
  margin: 12px 0;
}
.code-list code { display: block; font-size: 13px; color: #4f9cff; padding: 2px 0; font-family: monospace; }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #2a2a2a; }
th { color: #999; font-weight: 600; }
td { color: #ccc; }

.status-badge {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
}
.status-unused { background: #2a2a2a; color: #888; }
.status-active { background: #1a3a5a; color: #4f9cff; }
.status-completed { background: #1a3a1a; color: #4cff4c; }

.hidden { display: none; }
.success-text { color: #4cff4c; font-size: 13px; margin-top: 8px; }
.error-text { color: #e74c3c; font-size: 13px; margin-top: 8px; }

.country-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.country-row select { flex: 1; padding: 8px; background: #111; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 13px; }
.country-row input { width: 80px; padding: 8px; background: #111; border: 1px solid #333; border-radius: 6px; color: #fff; font-size: 13px; text-align: center; }
.country-row .btn-del { background: #3a1a1a; color: #e74c3c; border: none; border-radius: 6px; padding: 8px 12px; cursor: pointer; font-size: 13px; }
.country-row .btn-del:hover { background: #5a1a1a; }

.stats-table { width:100%; border-collapse:collapse; font-size:12px; }
.stats-table th, .stats-table td { padding:6px 8px; border-bottom:1px solid #2a2a2a; text-align:center; }
.stats-table th { color:#999; font-size:11px; }
.stats-table .rate-good { color:#4cff4c; }
.stats-table .rate-mid { color:#f0a040; }
.stats-table .rate-bad { color:#e74c3c; }
.stat-grid { display:flex; gap:12px; flex-wrap:wrap; }
.stat-item { flex:1; min-width:80px; background:#111; border-radius:8px; padding:12px; text-align:center; }
.stat-item .num { font-size:24px; font-weight:700; color:#fff; }
.stat-item .label { font-size:11px; color:#888; margin-top:4px; }

.error-toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #c0392b; color: #fff; padding: 12px 24px;
  border-radius: 8px; font-size: 14px; z-index: 100;
}
</style>
</head>
<body>
<div class="container">
  <h1>First Money 管理后台</h1>

  <!-- 登录 -->
  <div class="card" id="loginCard">
    <h2>管理员登录</h2>
    <div class="input-row">
      <label>密码</label>
      <input type="password" id="pwdInput" placeholder="管理员密码">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">登录</button>
  </div>

  <!-- 主内容 -->
  <div id="mainContent" class="hidden">

    <!-- 余额 -->
    <div id="balanceBar" style="background:#111;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:14px;display:flex;align-items:center;gap:12px;">
      <span style="font-size:18px;">💰</span>
      <span style="color:#999;">余额</span>
      <b id="balanceAmount" style="font-size:18px;color:#4cff4c;">---</b>
      <span id="balanceEstimate" style="color:#666;font-size:12px;"></span>
    </div>

    <!-- 配置 -->
    <div class="card">
      <h2>HeroSMS 配置</h2>
      <div class="input-row">
        <label>API Key</label>
        <input type="password" id="apiKeyInput" placeholder="HeroSMS API Key">
      </div>
      <div class="input-row">
        <label>服务代码</label>
        <input type="text" id="serviceInput" placeholder="如 dr (OpenAI)">
      </div>
      <div style="margin-top:12px;font-size:13px;color:#999;margin-bottom:8px;">国家列表（按价格从低到高依次尝试）</div>
      <div id="countriesList"></div>
      <button class="btn btn-outline btn-sm" onclick="addCountry()" style="width:auto;margin-top:8px;">+ 添加国家</button>
      <button class="btn btn-primary" onclick="saveConfig()" style="margin-top:12px;">保存配置</button>
      <div id="configMsg"></div>
      <div id="envHint" style="margin-top:8px;font-size:11px;color:#666;line-height:1.6;"></div>
    </div>

    <!-- 闲鱼发货 -->
    <div class="card">
      <h2>📦 闲鱼发货绑定</h2>
      <div style="font-size:12px;color:#888;margin-bottom:8px;">输入闲鱼订单号，自动绑定一张卡密</div>
      <div class="input-row">
        <label>订单号</label>
        <input type="text" id="orderNoInput" placeholder="闲鱼订单号">
      </div>
      <button class="btn btn-primary" onclick="bindOrder(event)">绑定卡密</button>
      <div id="bindResult" style="margin-top:12px;"></div>
    </div>

    <!-- 生成卡密（易店专用） -->
    <div class="card">
      <h2>🎫 生成卡密 · 导入易店</h2>
      <div style="font-size:12px;color:#888;margin-bottom:12px;">
        生成卡密 → 一键复制 → 粘贴到易店「卡密仓库」→ 绑定商品 → 自动发货
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
        <button class="btn btn-primary" onclick="generateCards(5)">+5 个</button>
        <button class="btn btn-primary" onclick="generateCards(10)">+10 个</button>
        <button class="btn btn-primary" onclick="generateCards(20)">+20 个</button>
        <button class="btn btn-primary" onclick="generateCards(50)">+50 个</button>
      </div>
      <div id="generatedCodes" class="code-list hidden"></div>
      <div style="margin-top:8px;display:flex;gap:8px;align-items:center;">
        <button class="btn btn-outline btn-sm hidden" id="copyBtn" onclick="copyCodes()">📋 一键复制（导入易店）</button>
        <button class="btn btn-outline btn-sm hidden" id="downloadBtn" onclick="downloadCodes()">⬇ 下载 .txt</button>
        <span id="genCount" style="font-size:12px;color:#888;"></span>
      </div>
    </div>

    <!-- 订单记录 -->
    <div class="card">
      <h2>订单记录</h2>
      <div id="ordersTable"></div>
      <div style="margin-top:12px;">
        <button class="btn btn-outline btn-sm" onclick="loadOrders()">刷新</button>
      </div>
    </div>

    <!-- 数据监控 -->
    <div class="card">
      <h2>📊 数据监控</h2>
      <div id="statsOverview" style="margin-bottom:12px;"></div>
      <h3 style="font-size:13px;color:#999;margin:12px 0 8px;">国家 × 价位成交量</h3>
      <div id="statsByCountry" style="overflow-x:auto;"></div>
      <h3 style="font-size:13px;color:#999;margin:12px 0 8px;">近期失败记录</h3>
      <div id="statsFailures" style="overflow-x:auto;"></div>
      <h3 style="font-size:13px;color:#999;margin:12px 0 8px;">换号次数分布</h3>
      <div id="statsReplace"></div>
      <div style="margin-top:12px;">
        <button class="btn btn-outline btn-sm" onclick="loadStats()">刷新数据</button>
      </div>
    </div>

  </div>
</div>

<script>
let token = '';

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'error-toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function $(id) { return document.getElementById(id); }

async function api(url, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['x-admin-password'] = token;
  const opts = body ? { method: 'POST', headers, body: JSON.stringify(body) } : { headers };
  const res = await fetch(url, opts);
  return res.json();
}

async function doLogin() {
  const pwd = $('pwdInput').value;
  const res = await api('/api/admin/login', { password: pwd });
  if (res.success) {
    token = pwd;
    $('loginCard').classList.add('hidden');
    $('mainContent').classList.remove('hidden');
    loadConfig();
    loadOrders();
    loadStats();
    loadBalance();
  } else {
    showToast('密码错误');
  }
}

// 可用国家列表（基于 HeroSMS getCountries API）
const ALL_COUNTRIES = [
  { id: 7,  name: '🇲🇾 马来西亚 (+60)', price: 0.03 },
  { id: 4,  name: '🇵🇭 菲律宾 (+63)', price: 0.05 },
  { id: 6,  name: '🇮🇩 印度尼西亚 (+62)', price: 0.05 },
  { id: 33, name: '🇨🇴 哥伦比亚 (+57)', price: 0.05 },
  { id: 16, name: '🇬🇧 英国 (+44)', price: 0.04 },
  { id: 50, name: '🇦🇹 奥地利 (+43)', price: 0.10 },
  { id: 56, name: '🇪🇸 西班牙 (+34)', price: 0.10 },
  { id: 151,name: '🇨🇱 智利 (+56)', price: 0.10 },
  { id: 2,  name: '🇰🇿 哈萨克斯坦 (+7)', price: 0.05 },
  { id: 8,  name: '🇰🇪 肯尼亚 (+254)', price: 0.10 },
  { id: 21, name: '🇪🇬 埃及 (+20)', price: 0.07 },
  { id: 22, name: '🇮🇳 印度 (+91)', price: 0.08 },
  { id: 52, name: '🇹🇭 泰国 (+66)', price: 0.10 },
  { id: 73, name: '🇧🇷 巴西 (+55)', price: 0.08 },
  { id: 54, name: '🇲🇽 墨西哥 (+52)', price: 0.10 },
  { id: 39, name: '🇦🇷 阿根廷 (+54)', price: 0.08 },
  { id: 19, name: '🇳🇬 尼日利亚 (+234)', price: 0.10 },
  { id: 43, name: '🇩🇪 德国 (+49)', price: 0.12 },
  { id: 187,name: '🇺🇸 美国 (+1)', price: 0.15 },
  { id: 182,name: '🇯🇵 日本 (+81)', price: 0.15 },
];

let currentCountries = [];

function renderCountries() {
  let html = '';
  currentCountries.forEach((c, i) => {
    const opts = ALL_COUNTRIES.map(ac =>
      `<option value="${ac.id}" ${ac.id == c.country_id ? 'selected' : ''}>${ac.name}</option>`
    ).join('');
    html += `<div class="country-row">
      <select onchange="currentCountries[${i}].country_id=parseInt(this.value)">${opts}</select>
      <span style="color:#999;font-size:12px;">最高$</span>
      <input type="number" value="${c.max_price}" step="0.01" min="0.01" onchange="currentCountries[${i}].max_price=parseFloat(this.value)">
      <button class="btn-del" onclick="removeCountry(${i})">✕</button>
    </div>`;
  });
  $('countriesList').innerHTML = html || '<div style="color:#555;font-size:13px;">暂未添加国家</div>';
}

function addCountry() {
  currentCountries.push({ country_id: 33, max_price: 0.05 });
  renderCountries();
}

function removeCountry(i) {
  currentCountries.splice(i, 1);
  renderCountries();
}

async function loadConfig() {
  try {
    const res = await api('/api/admin/config');
    if (res.error) { console.error('loadConfig error:', res.error); showToast('加载配置失败: ' + res.error); return; }
    $('apiKeyInput').value = res.hero_api_key || '';
    $('serviceInput').value = res.service_code || '';
    // 加载多国配置（countries_config 是权威来源）
    if (res.countries_config && Array.isArray(res.countries_config) && res.countries_config.length > 0) {
      currentCountries = JSON.parse(JSON.stringify(res.countries_config)); // 深拷贝防止引用污染
    } else if (res.country_id > 0) {
      // 兼容旧单国配置
      currentCountries = [{ country_id: res.country_id, max_price: res.max_price }];
    } else {
      currentCountries = [];
    }
    renderCountries();
    // 显示哪些字段来自 Render 环境变量（永久存储）
    const envFields = [];
    if (res._env) {
      if (res._env.hero_api_key) envFields.push('API Key');
      if (res._env.service_code) envFields.push('服务代码');
      if (res._env.countries_config) envFields.push('国家配置');
    }
    $('envHint').innerHTML = envFields.length > 0
      ? '🟢 以下字段来自 <b>Render 环境变量</b>（永久存储，重启不丢）：' + envFields.join('、')
      : '🟡 配置保存在 <b>数据库</b> 中，Render 重启后会从 config.json 恢复';
  } catch(e) {
    console.error('loadConfig 异常:', e);
    showToast('加载配置异常，请刷新页面重试');
  }
}

async function saveConfig() {
  // 直接从 DOM 读取各国配置，避免 onchange 在失焦前未触发导致保存旧值
  const rows = $('countriesList').querySelectorAll('.country-row');
  const cleanCountries = [];
  rows.forEach(row => {
    const select = row.querySelector('select');
    const input = row.querySelector('input[type="number"]');
    if (select && input) {
      cleanCountries.push({
        country_id: parseInt(select.value),
        max_price: parseFloat(input.value),
      });
    }
  });
  // 同步回 currentCountries
  currentCountries = cleanCountries;

  const res = await api('/api/admin/config', {
    hero_api_key: $('apiKeyInput').value,
    service_code: $('serviceInput').value,
    country_id: cleanCountries.length > 0 ? cleanCountries[0].country_id : 0,
    max_price: cleanCountries.length > 0 ? cleanCountries[0].max_price : 0,
    countries_config: cleanCountries,
  });
  const msg = $('configMsg');
  if (res.error) {
    msg.className = 'error-text';
    msg.textContent = res.error;
  } else {
    msg.className = 'success-text';
    msg.textContent = '配置已保存';
    // 保存后重新从服务器加载，确保前端状态与服务端一致
    await loadConfig();
    msg.textContent = '配置已保存 ✓';
    setTimeout(() => { msg.textContent = ''; }, 2000);
  }
}

let lastGeneratedCodes = [];

async function generateCards(count) {
  if (!count || count < 1 || count > 500) return showToast('数量应在 1-500 之间');

  const res = await api('/api/admin/cards', { count });
  if (res.error) return showToast(res.error);

  lastGeneratedCodes = res.codes;

  const list = $('generatedCodes');
  list.innerHTML = res.codes.map(c => `<code>${c}</code>`).join('');
  list.classList.remove('hidden');
  $('copyBtn').classList.remove('hidden');
  $('downloadBtn').classList.remove('hidden');
  $('genCount').textContent = `已生成 ${res.codes.length} 张卡密，可直接粘贴到易店「卡密仓库」`;
  showToast(`✅ 已生成 ${res.codes.length} 张卡密`);
}

function copyCodes() {
  const text = lastGeneratedCodes.join('\n');
  navigator.clipboard.writeText(text).then(() => showToast('✅ 已复制！去易店「卡密仓库」→ 批量导入 → 粘贴即可'));
}

function downloadCodes() {
  const text = lastGeneratedCodes.join('\n');
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `卡密_${new Date().toISOString().slice(0, 10)}_${lastGeneratedCodes.length}张.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('⬇ 已下载，文件可直接导入易店');
}

async function loadOrders() {
  const res = await api('/api/admin/cards?limit=50');
  if (res.error) return;

  const badges = {
    unused: 'status-unused',
    active: 'status-active',
    completed: 'status-completed',
  };

  let html = '<table><thead><tr><th>订单号</th><th>卡密</th><th>状态</th><th>手机号</th><th>验证码</th><th>换号</th><th>创建时间</th><th>操作</th></tr></thead><tbody>';
  for (const c of res.rows || []) {
    const canReset = c.status === 'active' || c.status === 'completed';
    html += `<tr>
      <td style="font-size:11px;color:#f0a040;">${c.order_no || '-'}</td>
      <td style="font-family:monospace;font-size:12px;">${c.code.substring(0,10)}...</td>
      <td><span class="status-badge ${badges[c.status] || ''}">${c.status}</span></td>
      <td>${c.phone_number || '-'}</td>
      <td>${c.sms_code || '-'}</td>
      <td style="text-align:center;">${c.replace_count || 0}/3</td>
      <td>${(c.created_at || '').replace('T', ' ').substring(0, 16)}</td>
      <td>${canReset ? `<button class="btn btn-outline btn-sm" onclick="resetCard(${c.id},'${c.code.substring(0,12)}...')" style="padding:4px 8px;font-size:11px;">重置</button>` : '-'}</td>
    </tr>`;
  }
  html += '</tbody></table>';
  $('ordersTable').innerHTML = html;
}

async function bindOrder(e) {
  const orderNo = $('orderNoInput').value.trim();
  if (!orderNo) return showToast('请输入订单号');
  const btn = e.target;
  btn.disabled = true; btn.textContent = '处理中...';
  try {
    const res = await api('/api/admin/cards/bind', { orderNo });
    const el = $('bindResult');
    if (res.success) {
      el.innerHTML = `<div class="success-text" style="font-size:14px;">✅ 绑定成功！<br><br>
        <b>订单号:</b> ${res.orderNo}<br>
        <b>卡密:</b> <code style="background:#111;padding:2px 6px;border-radius:4px;font-size:14px;">${res.code}</code><br><br>
        <div style="font-size:12px;color:#888;">用户可通过订单号自助获取卡密</div>
        <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText('${res.code}')" style="margin-top:8px;">复制卡密</button>
        <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText(\`${res.guide.replace(/\n/g,'\\n').replace(/`/g,'\\`')}\`)" style="margin-top:8px;">复制使用说明</button></div>`;
      $('orderNoInput').value = '';
      loadOrders();
    } else {
      el.innerHTML = '<div class="error-text">' + (res.error || '绑定失败') + '</div>';
    }
  } catch(e) { showToast('网络错误'); }
  btn.disabled = false; btn.textContent = '绑定卡密';
}

async function loadBalance() {
  try {
    const res = await api('/api/admin/balance');
    if (res.balance == null) { $('balanceAmount').textContent = '查询失败'; return; }

    const b = res.balance;
    let color = '#4cff4c';
    if (b < res.minPrice * 10) color = '#f0a040';
    if (b < res.minPrice * 5) color = '#e74c3c';

    $('balanceAmount').textContent = '$' + b.toFixed(2);
    $('balanceAmount').style.color = color;
    $('balanceEstimate').textContent = '｜约可购买 ' + res.estimatedBuys + ' 次 (最低 $' + res.minPrice.toFixed(3) + ')';
  } catch(e) {}
}

async function resetCard(id, label) {
  if (!confirm('确定要重置卡密 ' + label + ' 吗？\n\n系统会尝试退款当前号码，然后将卡密恢复为未使用状态。')) return;

  try {
    const res = await api('/api/admin/cards/' + id + '/reset', {});
    if (res.success) {
      showToast('✅ 卡密 ' + label + ' 已重置');
      loadOrders();
      loadBalance();
      loadStats();
    } else {
      showToast('重置失败: ' + (res.error || '未知错误'));
    }
  } catch(e) {
    showToast('网络错误');
  }
}

async function loadStats() {
  try {
    const res = await api('/api/admin/stats');
    if (res.error) return;

    // 总览
    const o = res.overview || {};
    $('statsOverview').innerHTML = `<div class="stat-grid">
      <div class="stat-item"><div class="num">${o.total_used||0}</div><div class="label">总成交量</div></div>
      <div class="stat-item"><div class="num" style="color:#4cff4c;">${o.total_success||0}</div><div class="label">成功收码</div></div>
      <div class="stat-item"><div class="num" style="color:#f0a040;">${o.total_active||0}</div><div class="label">等待中</div></div>
      <div class="stat-item"><div class="num">$${(o.total_spent||0).toFixed(2)}</div><div class="label">总花费</div></div>
      <div class="stat-item"><div class="num">${o.countries_used||0}</div><div class="label">使用国家数</div></div>
    </div>`;

    // 国家×价位
    let html = '<table class="stats-table"><thead><tr><th>国家</th><th>价位</th><th>成交量</th><th>收码</th><th>成功率</th><th>等待中</th><th>空闲</th></tr></thead><tbody>';
    for (const r of res.byCountry || []) {
      const cls = r.success_rate >= 70 ? 'rate-good' : r.success_rate >= 40 ? 'rate-mid' : 'rate-bad';
      html += `<tr>
        <td>${r.country_name}</td><td>$${r.price}</td><td>${r.total}</td>
        <td>${r.got_code}</td><td class="${cls}">${r.success_rate}%</td>
        <td>${r.waiting}</td><td>${r.idle}</td>
      </tr>`;
    }
    html += '</tbody></table>';
    $('statsByCountry').innerHTML = html || '<div style="color:#555;">暂无数据</div>';

    // 失败记录
    html = '<table class="stats-table"><thead><tr><th>国家</th><th>价位</th><th>类型</th><th>次数</th></tr></thead><tbody>';
    for (const r of res.failures || []) {
      html += `<tr><td>${r.country_name}</td><td>$${r.price}</td><td>${r.type_name}</td><td>${r.count}</td></tr>`;
    }
    html += '</tbody></table>';
    $('statsFailures').innerHTML = html || '<div style="color:#555;">暂无失败记录</div>';

    // 换号分布
    html = '';
    const labels = {1:'换过1次',2:'换过2次',3:'换过3次'};
    for (const r of res.replaceDist || []) {
      html += `<span style="display:inline-block;background:#1a1a1a;border-radius:6px;padding:4px 10px;margin:2px;font-size:12px;">${labels[r.replace_count]||('换'+r.replace_count+'次')}: <b style="color:#f0a040;">${r.count}</b> 张</span>`;
    }
    $('statsReplace').innerHTML = html || '<div style="color:#555;">暂无</div>';

  } catch(e) { console.error(e); }
}
</script>
</body>
</html>
